name: Deploy Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: web
        run: npm install --include=dev

      - name: Create .env file
        env:
          FB_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          FB_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          FB_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          FB_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          FB_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          FB_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        working-directory: web
        run: |
          echo "VITE_FIREBASE_API_KEY=$FB_API_KEY" > .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=$FB_AUTH_DOMAIN" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=primeseva-mvp" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=$FB_STORAGE_BUCKET" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=$FB_SENDER_ID" >> .env
          echo "VITE_FIREBASE_APP_ID=$FB_APP_ID" >> .env

      - name: Build
        working-directory: web
        run: npm run build

      - name: Secure Environment (Cleanup)
        working-directory: web
        run: rm .env

      - name: Deploy to Firebase Hosting
        working-directory: web
        run: |
          npm install -g firebase-tools
          export GOOGLE_APPLICATION_CREDENTIALS=../service-account.json
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}' > ../service-account.json
          firebase deploy --only hosting --project primeseva-mvp
          rm ../service-account.json
