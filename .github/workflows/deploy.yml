name: Deploy Demo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './web/package-lock.json'

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        env:
          FB_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          FB_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          FB_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          FB_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          FB_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          FB_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          if [ -z "$FB_API_KEY" ]; then
            echo "::error::VITE_FIREBASE_API_KEY is missing from secrets!"
            exit 1
          fi
          echo "VITE_FIREBASE_API_KEY=$FB_API_KEY" > .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=$FB_AUTH_DOMAIN" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=$FB_PROJECT_ID" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=$FB_STORAGE_BUCKET" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=$FB_SENDER_ID" >> .env
          echo "VITE_FIREBASE_APP_ID=$FB_APP_ID" >> .env

      - name: Build
        run: npm run build

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --token "${{ secrets.FIREBASE_TOKEN }}" --only hosting --non-interactive
